# Example values for fluent-bit Helm chart (ELK/Loki-compatible)
serviceAccount:
  create: true

config:
  service: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off

  outputs: |
    [OUTPUT]
        Name  es
        Match kube.*
        Host  elasticsearch-master
        Port  9200
        Index trust-score-logs
        Logstash_Format On
