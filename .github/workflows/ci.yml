name: CI

on:
  pull_request:
  push:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data_pipeline/requirements.txt
          pip install -r models/requirements.txt
          pip install -r api_service/requirements.txt
          pip install -r dashboard/requirements.txt
          pip install flake8 bandit safety

      - name: Lint (flake8)
        run: |
          flake8 data_pipeline/src models api_service/app security/tests tests scripts dashboard

      - name: Setup Node for eslint (optional)
        if: ${{ hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint (eslint when package.json exists)
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          npm ci
          npx eslint .

      - name: Skip eslint
        if: ${{ hashFiles('**/package.json') == '' }}
        run: echo "No package.json found. Skipping eslint."

      - name: Unit and integration tests
        run: |
          pytest

      - name: Security scan (bandit)
        run: |
          bandit -q -r data_pipeline/src models api_service/app security/tests scripts

      - name: Dependency scan (safety)
        run: |
          safety check --full-report || true

      - name: Secret leak check
        run: |
          python scripts/check_secrets.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build data pipeline image
        run: docker build -t trust-bank/data-pipeline:ci ./data_pipeline

      - name: Build API image
        run: docker build -t trust-bank/api-service:ci ./api_service

      - name: Build dashboard image
        run: docker build -t trust-bank/dashboard:ci ./dashboard
