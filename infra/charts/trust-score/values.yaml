replicaCount: 2
image:
  repository: registry.example.com/trust-score
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  canaryPort: 8000

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

env:
  SERVICE_DB_URL: "postgresql+asyncpg://service:service@rds:5432/service"
  REDIS_URL: "redis://redis:6379/0"
  MODEL_ONNX_PATH: "/models/model.onnx"
  MODEL_FEATURES_PATH: "/resources/model_features.json"
  JWT_ISSUER: "trust-score-service"
  JWT_AUDIENCE: "trust-score-clients"
  RATE_LIMIT_PER_MINUTE: "60"
  CACHE_TTL_SEC: "300"
  ENFORCE_TLS: "true"
  CORS_ORIGINS: "https://app.example.com"
  AGENT_ALLOWED_IDS: "agent-001"
  AGENT_SKILL_BLACKLIST: "skill-dangerous-001"
  AGENT_SKILL_ALLOWLIST: "trust-score-skill"

secrets:
  JWT_SECRET: ""
  AGENT_SIGNING_SECRET: ""

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: trust-score.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: trust-score-tls
      hosts:
        - trust-score.example.com

canary:
  enabled: false
  weight: 10
  imageTag: "canary"
