x-airflow-common: &airflow-common
  build:
    context: ./data_pipeline
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@pipeline-postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    ETL_DB_URL: postgresql+psycopg2://airflow:airflow@pipeline-postgres:5432/airflow
    S3_ENDPOINT_URL: http://minio:9000
    S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
    S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    S3_REGION: ${S3_REGION:-us-east-1}
    S3_BUCKET: ${S3_BUCKET:-raw-data}
    S3_PREFIX: ${S3_PREFIX:-raw}
    KMS_KEY_ID: ${KMS_KEY_ID:-kms-placeholder}
  volumes:
    - ./data_pipeline/dags:/opt/airflow/dags
    - ./data_pipeline/src:/opt/airflow/src
    - ./data_pipeline/data:/opt/airflow/data
  depends_on:
    - pipeline-postgres
    - minio

services:
  pipeline-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - pipeline-postgres-data:/var/lib/postgresql/data
      - ./data_pipeline/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-01-28T02-34-57Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-raw-data} &&
      /usr/bin/mc anonymous set none local/${S3_BUCKET:-raw-data}
      "

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  service-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: service
      POSTGRES_PASSWORD: service
      POSTGRES_DB: service
    ports:
      - "5433:5432"
    volumes:
      - service-postgres-data:/var/lib/postgresql/data
      - ./api_service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  trust-score-service:
    build:
      context: ./api_service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_DB_URL: postgresql+asyncpg://service:service@service-postgres:5432/service
      REDIS_URL: redis://redis:6379/0
      MODEL_ONNX_PATH: /app/models/model.onnx
      MODEL_FEATURES_PATH: /app/models/model_features.json
      MODEL_FEATURE_IMPORTANCE_PATH: /app/models/feature_importance.json
      JWT_ISSUER: trust-score-service
      JWT_AUDIENCE: trust-score-clients
      CORS_ORIGINS: http://localhost:8501,http://localhost:3000
      ENFORCE_TLS: "false"
      KMS_SECRETS_URI: ${KMS_SECRETS_URI:-kms://placeholder/local/dev}
    ports:
      - "8000:8000"
    depends_on:
      - service-postgres
      - redis
    volumes:
      - ./models/output:/app/models:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      TRUST_SCORE_URL: http://trust-score-service:8000
      TRUST_SCORE_TOKEN: ${DASHBOARD_TRUST_SCORE_TOKEN:-}
      DEMO_DATA_PATH: /app/dashboard/data/demo_trust_scores.csv
      DEMO_EXPLANATION_PATH: /app/dashboard/data/demo_explanations.csv
    ports:
      - "8501:8501"
    depends_on:
      - trust-score-service

volumes:
  minio-data:
  pipeline-postgres-data:
  service-postgres-data:
